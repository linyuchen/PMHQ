name: Build and Push PMHQ Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version tag for the Docker image (leave empty to use the latest release)
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Resolve image version
        id: get_version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "release" ]]; then
            version="$RELEASE_TAG"
          elif [[ -n "$INPUT_VERSION" ]]; then
            version="$INPUT_VERSION"
          else
            version="$(
              curl --fail --silent --show-error --location \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "https://api.github.com/repos/$REPOSITORY/releases/latest" |
                jq -r '.tag_name'
            )"
          fi

          version="${version#v}"
          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "::error::Unable to resolve a Docker image version."
            exit 1
          fi
          if [[ ! "$version" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            echo "::error::Version '$version' is not a valid Docker tag."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building PMHQ version: $version"

      - name: Build and push PMHQ Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            PMHQ_VERSION=${{ steps.get_version.outputs.version }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/pmhq:${{ steps.get_version.outputs.version }}
            ${{ secrets.DOCKER_USERNAME }}/pmhq:latest

      - name: Output build summary
        run: |
          echo "Successfully built and pushed PMHQ Docker image"
          echo "Image tags:"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/pmhq:${{ steps.get_version.outputs.version }}"
          echo "  - ${{ secrets.DOCKER_USERNAME }}/pmhq:latest"
